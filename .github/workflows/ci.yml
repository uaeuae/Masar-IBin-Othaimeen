name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    name: Flutter (analyze, format, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      # drift unit tests need a loadable sqlite3 shared library on the host
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  ingest:
    name: Ingest (typecheck, test, validate seeds)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/ingest/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run validate:seeds
