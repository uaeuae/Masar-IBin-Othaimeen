name: masar
description: "مسار ابن عثيمين — مسارات تعليمية منظمة لدروس الشيخ محمد بن صالح العثيمين رحمه الله"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.2.3
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  youtube_player_iframe: ^5.2.2
  cached_network_image: ^3.4.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  sqlite3: ^2.9.4
  build_runner: ^2.15.1
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon_full.png
  adaptive_icon_background: "#1E5B45"
  adaptive_icon_foreground: assets/icon/icon_fg.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1E5B45"
  image: assets/icon/icon_fg.png
  android_12:
    color: "#1E5B45"
    image: assets/icon/icon_fg.png

flutter:
  uses-material-design: true

  assets:
    - assets/catalog/

  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
